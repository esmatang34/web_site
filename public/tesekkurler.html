<!DOCTYPE html>
<html lang="tr">
<head>
<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XVY5HPL7KJ"></script>

  gtag('js', new Date());

  gtag('config', 'G-XVY5HPL7KJ');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teşekkürler / Thank You — Esma Tang</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF9;
    --bg-panel: #F1F1EE;
    --ink: #14181F;
    --ink-soft: #4B5259;
    --line: #DEDEDA;
    --accent: #2B3A67;
    --accent-bright: #7A1C2E;
  }

  body.dark-theme {
    --bg: #0C0F12;
    --bg-panel: #161A1F;
    --ink: #FAFAF9;
    --ink-soft: #9EA5B0;
    --line: #242B35;
    --accent: #60A5FA;
    --accent-bright: #A63F52;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* Language visibility */
  body.lang-tr .en { display: none !important; }
  body.lang-en .tr { display: none !important; }

  .card {
    text-align: center;
    max-width: 460px;
    width: 100%;
    padding: 48px 32px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .success-icon {
    width: 64px;
    height: 64px;
    color: var(--accent);
    stroke-width: 1.5;
    fill: none;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 500;
  }

  p {
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.6;
  }

  .btn {
    display: inline-block;
    padding: 13px 26px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-decoration: none;
    border-radius: 2px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: transform 0.15s ease, background 0.15s ease;
    margin-top: 10px;
  }

  .btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<div class="card">
  <svg class="success-icon" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
  </svg>
  
  <h1>
    <span class="tr">Talebiniz Alındı</span>
    <span class="en">Thank You</span>
  </h1>
  
  <p>
    <span class="tr">İletişim talebiniz başarıyla bize ulaştı. En kısa sürede sizinle iletişime geçeceğiz.</span>
    <span class="en">Your contact request has been received successfully. We will get back to you as soon as possible.</span>
  </p>
  
  <a href="/" class="btn">
    <span class="tr">Ana Sayfaya Dön</span>
    <span class="en">Back to Home</span>
  </a>
</div>

<script>
  // Apply theme from localStorage
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark-theme');
  }

  // Apply language from localStorage
  const savedLang = localStorage.getItem('lang') || 'tr';
  document.body.classList.add('lang-' + savedLang);
</script>
</body>
</html>
