<svg xmlns="http://www.w3.org/2000/svg" viewBox="-16 -16 32 32">
  <style>
    :root {
      --color: #7A1C2E;
      --bg-stroke: #FAFAF9;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color: #60A5FA;
        --bg-stroke: #0C0F12;
      }
    }
    .fill-color { fill: var(--color); }
    .stroke-color { stroke: var(--color); }
    .bg-stroke { stroke: var(--bg-stroke); }
  </style>
  
  <!-- Center bottom teardrop -->
  <path class="fill-color bg-stroke" d="M 0 -1 C 2.5 -1 3.5 3 3.5 8 C 3.5 12 1.5 15 0 15 C -1.5 15 -3.5 12 -3.5 8 C -3.5 3 -2.5 -1 0 -1 Z" stroke-width="0.8" stroke-linejoin="round"/>
  
  <!-- Central stamen -->
  <path class="stroke-color" d="M 0 -2 L 0 -13" fill="none" stroke-width="1" stroke-linecap="round"/>
  <circle class="fill-color" cx="0" cy="-14.2" r="1.2"/>
  
  <!-- Right side elements -->
  <g id="right-blossom-group">
    <!-- Side stamen -->
    <path class="stroke-color" d="M 0 -2 C 1.5 -6 3.5 -9.5 6 -11.2" fill="none" stroke-width="1" stroke-linecap="round"/>
    <circle class="fill-color" cx="6" cy="-12.4" r="1.2"/>
    
    <!-- Upper petal -->
    <path class="fill-color bg-stroke" d="M 0 -2 C 1.5 -6 4.5 -8.5 7.5 -8.5 C 9.5 -8.5 11 -7.5 9.5 -4.5 C 8.5 -2.5 5 -0.5 0 -2 Z" stroke-width="0.8" stroke-linejoin="round"/>
    
    <!-- Side tiny leaf -->
    <path class="fill-color bg-stroke" d="M 8.8 -5 C 9.8 -5 11.2 -4.5 11.5 -3.5 C 10.8 -2.8 9.8 -2.8 8.8 -3.2 Z" stroke-width="0.8" stroke-linejoin="round"/>
    
    <!-- Lower petal -->
    <path class="fill-color bg-stroke" d="M 0 -2 C 2.5 -2 7.5 -1 9.5 3 C 10.5 5.5 10 8.5 8 10 C 8.5 8 8 5 5 2.5 C 3 1 1 -0.5 0 -2 Z" stroke-width="0.8" stroke-linejoin="round"/>
  </g>
  
  <!-- Left side mirrored -->
  <use href="#right-blossom-group" transform="scale(-1, 1)"/>
</svg>
