<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -10 30 30">
  <style>
    :root {
      --color: #7A1C2E;
      --bg-stroke: #FAFAF9;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color: #000000;
        --bg-stroke: #FAFAF9;
      }
    }
    .fill-color { fill: var(--color); }
    .bg-stroke { stroke: var(--bg-stroke); }
  </style>
  
  <!-- Center bottom circle -->
  <circle class="fill-color bg-stroke" cx="0" cy="10" r="3" stroke-width="0.8"/>
  
  <!-- Central vertical petal -->
  <path class="fill-color bg-stroke" d="M 0 7 C 2.5 7 2.5 -1 0 -5 C -2.5 -1 -2.5 7 0 7 Z" stroke-width="0.8" stroke-linejoin="round"/>
  
  <!-- Right side elements -->
  <g id="right-lotus-group">
    <!-- Horizontal right petal -->
    <path class="fill-color bg-stroke" d="M 2.5 10 C 2.5 7.5 7.5 7.5 12 10 C 7.5 12.5 2.5 12.5 2.5 10 Z" stroke-width="0.8" stroke-linejoin="round"/>
    <!-- 45-degree right petal -->
    <path class="fill-color bg-stroke" d="M 2 8 C 3.2 5 6.2 2 9.2 1 C 8 3.2 5 6.2 2 8 Z" stroke-width="0.8" stroke-linejoin="round"/>
    <!-- Floating dots (stamens) -->
    <circle class="fill-color" cx="4.5" cy="-2.5" r="1.2"/>
    <circle class="fill-color" cx="10.2" cy="4.5" r="1.2"/>
  </g>
  
  <!-- Left side mirrored -->
  <use href="#right-lotus-group" transform="scale(-1, 1)"/>
</svg>
